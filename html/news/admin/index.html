<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager — SKI News</title>
  <link rel="icon" href="https://sarjanakomputer.id/images/favicon.png" type="image/png">
</head>
<body>
  <!-- Pre-load config to avoid async race condition during React init -->
  <script>
    // Prevent auto-init — wait for token fetch to complete first
    window.CMS_MANUAL_INIT = true;

    window.CMS_CONFIG = {
      backend: {
        name: "github",
        repo: "muhdanfyan/sarjanakomputer.id",
        branch: "main",
        base_url: "https://news.sarjanakomputer.id",
        auth_endpoint: "/api/auth"
      },
      media_folder: "html/images/news",
      public_folder: "/images/news",
      publish_mode: "editorial_workflow",
      load_config_file: false,
      collections: [
        {
          name: "berita",
          label: "Berita",
          label_singular: "Berita",
          folder: "html/news/content",
          create: true,
          slug: "{{slug}}",
          identifier_field: "title",
          format: "frontmatter",
          editor: { preview: false },
          fields: [
            { label: "Judul", name: "title", widget: "string" },
            { label: "Tanggal", name: "date", widget: "datetime", format: "YYYY-MM-DD" },
            { label: "Kategori", name: "category", widget: "select", options: ["Teknologi", "Pendidikan", "Bisnis", "Pemerintahan", "Startup"] },
            { label: "Gambar Sampul", name: "image", widget: "image", required: false },
            { label: "Deskripsi Singkat", name: "description", widget: "text" },
            { label: "Konten", name: "body", widget: "markdown" },
            { label: "Penulis", name: "author", widget: "string", default: "Tim SKI" }
          ]
        }
      ]
    };
  </script>
  <script src="https://unpkg.com/decap-cms@3.0.0/dist/decap-cms.js"></script>
  <script>
    // ===== Step 2: Fetch token from auth proxy, store, then init CMS =====
    (function() {
      var BACKEND = 'github';
      var REPO = 'muhdanfyan/sarjanakomputer.id';

      fetch('/api/auth?json=1')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data && data.token) {
            // Store token in possible localStorage key formats
            var keys = [
              'cms.auth.' + BACKEND + '.' + REPO,
              'cms.auth.' + BACKEND + '.' + REPO.replace('/', '.'),
              'ghost:' + BACKEND + ':' + REPO + ':token',
            ];
            var val = JSON.stringify({ token: data.token });
            keys.forEach(function(k) {
              try { localStorage.setItem(k, val); } catch(e) {}
            });
          }
        })
        .catch(function(err) {
          console.error('Auth fetch failed:', err);
        })
        .finally(function() {
          // Now init CMS (regardless of auth success, CMS handles the UI)
          if (window.initCMS) {
            window.initCMS();
          }
        });
    })();
  </script>
</body>
</html>
