<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager — SKI News</title>
  <link rel="icon" href="https://sarjanakomputer.id/images/favicon.png" type="image/png">
  <script>
    // ===== CRITICAL: Handle auth token BEFORE React Router modifies the URL =====
    // When Decap CMS redirects back from the auth proxy, the URL has:
    //   /news/admin/#access_token=TOKEN
    // or (after React Router messes with it):
    //   /news/admin/#/access_token=TOKEN
    //
    // We parse both formats here (in <head>, before any React code runs),
    // store the token in localStorage, and clean the URL.

    (function() {
      var hash = window.location.hash || '';

      if (hash && hash.indexOf('access_token') !== -1) {
        // Remove leading # or #/ or #! or just #
        var cleaned = hash.replace(/^#[!\/]*/, '');
        var params = new URLSearchParams(cleaned);
        var token = params.get('access_token');

        if (token) {
          // Store in ALL possible localStorage keys Decap CMS might check
          var val = JSON.stringify({ token: token });
          var keys = [
            'cms.auth',
            'cms.auth.github.muhdanfyan/sarjanakomputer.id',
            'cms.auth.github.muhdanfyan.sarjanakomputer.id',
            'ghost:github:muhdanfyan/sarjanakomputer.id:token'
          ];
          keys.forEach(function(k) {
            try { localStorage.setItem(k, val); } catch(e) {}
          });

          // Clean the URL so React Router doesn't see the token
          history.replaceState({}, '', '/news/admin/');
        }
      }
    })();
  </script>
</head>
<body>
  <script>
    window.CMS_CONFIG = {
      backend: {
        name: "github",
        repo: "muhdanfyan/sarjanakomputer.id",
        branch: "main",
        base_url: "https://news.sarjanakomputer.id",
        auth_endpoint: "/api/auth"
      },
      media_folder: "html/images/news",
      public_folder: "/images/news",
      publish_mode: "editorial_workflow",
      load_config_file: false,
      collections: [
        {
          name: "berita",
          label: "Berita",
          label_singular: "Berita",
          folder: "html/news/content",
          create: true,
          slug: "{{slug}}",
          identifier_field: "title",
          format: "frontmatter",
          editor: { preview: false },
          fields: [
            { label: "Judul", name: "title", widget: "string" },
            { label: "Tanggal", name: "date", widget: "datetime", format: "YYYY-MM-DD" },
            { label: "Kategori", name: "category", widget: "select", options: ["Teknologi", "Pendidikan", "Bisnis", "Pemerintahan", "Startup"] },
            { label: "Gambar Sampul", name: "image", widget: "image", required: false },
            { label: "Deskripsi Singkat", name: "description", widget: "text" },
            { label: "Konten", name: "body", widget: "markdown" },
            { label: "Penulis", name: "author", widget: "string", default: "Tim SKI" }
          ]
        }
      ]
    };
  </script>
  <script src="https://unpkg.com/decap-cms@3.0.0/dist/decap-cms.js"></script>
</body>
</html>
