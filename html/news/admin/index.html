<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CMS — Sarjana Komputer News</title>
  <script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>
  <style>
    body{font-family:Inter,sans-serif;background:#f5f5f5;margin:0}
  </style>
  <link rel="manifest" href="/manifest.json">
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <script>
    // Redirect ke halaman login Decap CMS
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', user => {
        if (!user) window.netlifyIdentity.on('login', () => document.location.href = '/news/admin/');
      });
    }
  </script>
<script>
if('serviceWorker'in navigator){navigator.serviceWorker.register('/sw.js');}
</script>
</body>
</html>
