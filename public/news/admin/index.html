<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager — SKI News</title>
  <link rel="icon" href="https://sarjanakomputer.id/images/favicon.png" type="image/png">
  <script>
    // 1. Force trailing slash for correct relative path resolution
    if (!window.location.pathname.endsWith('/') && !window.location.pathname.endsWith('.html')) {
      window.location.replace(window.location.pathname + '/' + window.location.search + window.location.hash);
    }
    // 2. Prevent auto-init so we can inject inline config
    window.CMS_MANUAL_INIT = true;
  </script>
</head>
<body>
  <script src="/js/decap-cms.js"></script>
  <script>
    // INLINE CONFIGURATION - Bypasses config.yml fetch (Fixes 404 errors)
    var cmsConfig = {
      backend: {
        name: "github",
        repo: "muhdanfyan/sarjanakomputer.id",
        branch: "main",
        base_url: "https://news.sarjanakomputer.id",
        auth_endpoint: "/api/auth"
      },
      local_backend: window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1',
      media_folder: "public/images/news",
      public_folder: "/images/news",
      publish_mode: "editorial_workflow",
      logo_url: "https://sarjanakomputer.id/images/logo.png",
      display_url: "https://sarjanakomputer.id",
      collections: [
        {
          name: "berita",
          label: "Berita",
          label_singular: "Berita",
          folder: "public/news/content",
          create: true,
          slug: "{{slug}}",
          identifier_field: "title",
          format: "frontmatter",
          editor: {
            preview: false
          },
          fields: [
            { label: "Judul", name: "title", widget: "string" },
            { label: "Tanggal", name: "date", widget: "datetime", format: "YYYY-MM-DD" },
            { label: "Kategori", name: "category", widget: "select", options: ["Teknologi", "Pendidikan", "Bisnis", "Pemerintahan", "Startup"] },
            { label: "Gambar Sampul", name: "image", widget: "image", required: false },
            { label: "Deskripsi Singkat", name: "description", widget: "text" },
            { label: "Konten", name: "body", widget: "markdown" },
            { label: "Penulis", name: "author", widget: "string", default: "Tim SKI" }
          ]
        }
      ]
    };

    if (typeof CMS !== 'undefined') {
      CMS.init({ config: cmsConfig });
    } else {
      document.body.innerHTML = '<pre style="color:#c00;padding:2rem">ERROR: Decap CMS failed to load</pre>';
    }
  </script>
</body>
</html>
