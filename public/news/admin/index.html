<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager — SKI News</title>
  <link rel="icon" href="https://sarjanakomputer.id/images/favicon.png" type="image/png">
  <link href="/news/admin/config.yml" type="text/yaml" rel="cms-config-url">
  <!--
    Decap CMS 3.3.0 — versi stabil. Versi ≥3.8.1 memiliki Immer.js toJS() regression.
    Config otomatis di-load dari config.yml (load_config_file: default true).
  -->
</head>
<body>
  <script src="/js/decap-cms.js"></script>
  <script>
    // Decap CMS v3 auto-inits after loading the script.
    if (typeof CMS === 'undefined') {
      document.body.innerHTML = '<pre style="color:#c00;padding:2rem">ERROR: Decap CMS failed to load (CMS object not found)</pre>';
    }
  </script>
</body>
</html>
