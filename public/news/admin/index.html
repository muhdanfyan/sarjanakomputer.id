<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager — SKI News</title>
  <link rel="icon" href="https://sarjanakomputer.id/images/favicon.png" type="image/png">
  <script>
    (function() {
      var h = window.location.hostname;
      var p = window.location.pathname;
      var s = window.location.search;
      var f = window.location.hash;
      var changed = false;

      // 1. Remove redundant /news/ prefix on news subdomain
      if (h.startsWith('news.') && p.startsWith('/news/')) {
        p = p.replace('/news/', '/');
        changed = true;
      }

      // 2. Force trailing slash for correct relative path resolution
      if (!p.endsWith('/') && !p.endsWith('.html')) {
        p += '/';
        changed = true;
      }

      if (changed) {
        window.location.replace(window.location.origin + p + s + f);
      }
    })();
  </script>
  <script>
    // Add cache buster to config URL
    var link = document.createElement('link');
    link.rel = 'cms-config-url';
    link.type = 'text/yaml';
    link.href = 'https://sarjanakomputer.id/news/admin/config.yml?cb=' + new Date().getTime();
    document.head.appendChild(link);
  </script>
  <!--
    Decap CMS 3.3.0 — versi stabil. Versi ≥3.8.1 memiliki Immer.js toJS() regression.
    Config otomatis di-load dari config.yml (load_config_file: default true).
  -->
</head>
<body>
  <script src="/js/decap-cms.js"></script>
  <script>
    // Decap CMS v3 auto-inits after loading the script.
    if (typeof CMS === 'undefined') {
      document.body.innerHTML = '<pre style="color:#c00;padding:2rem">ERROR: Decap CMS failed to load (CMS object not found)</pre>';
    }
  </script>
</body>
</html>
