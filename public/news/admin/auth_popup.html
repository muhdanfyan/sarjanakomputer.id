<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <title>Autentikasi — Sarjana Komputer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Inter', sans-serif; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      margin: 0; 
      background: linear-gradient(135deg, #050a20 0%, #0f1f4a 100%); 
      color: #fff; 
    }
    .loader { 
      text-align: center; 
      background: rgba(255, 255, 255, 0.05); 
      padding: 2.5rem; 
      border-radius: 24px; 
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .spinner { 
      border: 3px solid rgba(255,255,255,0.1); 
      border-top: 3px solid #E3386A; 
      border-radius: 50%; 
      width: 40px; 
      height: 40px; 
      animation: spin .8s linear infinite; 
      margin: 0 auto 20px; 
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    h2 { font-size: 1.2rem; margin: 0 0 0.5rem; font-weight: 600; }
    p { font-size: 0.9rem; color: rgba(255,255,255,0.6); margin: 0; }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <h2>Menghubungkan...</h2>
    <p>Mohon tunggu sebentar</p>
  </div>
  <script>
    (function() {
      // ===== Decap CMS OAuth Protocol =====
      // Decap CMS (v3.0.0) GitHub backend uses a 2-step postMessage handshake:
      // 1. Popup sends  "authorizing:{provider}"     → main window echoes it back
      // 2. Popup sends  "authorization:{provider}:success:{json}"  → main window completes auth
      // Provider is "github" for GitHub backend.

      var PROVIDER = 'github';
      var TOKEN = null;

      // Extract token from URL hash: #access_token=TOKEN or #/access_token=TOKEN
      var hash = window.location.hash;
      if (hash) {
        var cleaned = hash.replace(/^#\//, '').replace(/^#/, '');
        var params = new URLSearchParams(cleaned);
        TOKEN = params.get('access_token');
      }

      if (!TOKEN) {
        document.querySelector('.loader p').textContent = 'No access token found. Close this tab.';
        return;
      }

      if (!window.opener) {
        document.querySelector('.loader p').textContent =
          'No opener window found. You can close this tab.';
        return;
      }

      // Step 1: Listen for handshake echo from main window
      function waitForHandshake() {
        window.addEventListener('message', function onMessage(event) {
          // Main window echoes back "authorizing:github" to confirm handshake
          if (event.data === 'authorizing:' + PROVIDER) {
            window.removeEventListener('message', onMessage);

            // Step 2: Send authorization payload
            var authPayload = JSON.stringify({
              token: TOKEN,
              provider: PROVIDER
            });

            window.opener.postMessage(
              'authorization:' + PROVIDER + ':success:' + authPayload,
              '*'
            );

            // Close popup shortly after
            setTimeout(function() {
              window.close();
            }, 200);
          }
        });
      }

      // Step 0: Initiate handshake by sending "authorizing:github"
      var openerOrigin = '*';
      try {
        // Try to use a more specific origin if possible (same origin)
        if (window.opener.location) {
          openerOrigin = window.opener.location.origin;
        }
      } catch(e) {
        // Cross-origin, fall back to '*'
      }

      waitForHandshake();
      window.opener.postMessage('authorizing:' + PROVIDER, openerOrigin);
    })();
  </script>
</body>
</html>
