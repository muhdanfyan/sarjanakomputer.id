backend:
  name: github
  repo: muhdanfyan/sarjanakomputer.id
  branch: main
  base_url: https://news.sarjanakomputer.id
  auth_endpoint: /api/auth

media_folder: "html/images/news"
public_folder: "/images/news"

# Cloudinary media library — akan diaktifkan lagi setelah CMS confirmed working
# media_library:
#   name: cloudinary
#   config:
#     cloud_name: ddhgtgsed
#     api_key: 684916711959441
#     default_transformations:
#       - - fetch_format: auto
#           quality: auto
#           width: 1200
#           crop: fill
#           gravity: auto

publish_mode: editorial_workflow

logo_url: https://sarjanakomputer.id/images/logo.png
display_url: https://sarjanakomputer.id

collections:
  - name: "berita"
    label: "Berita"
    label_singular: "Berita"
    folder: "html/news/content"
    create: true
    slug: "{{slug}}"
    identifier_field: title
    format: "frontmatter"
    # sortable_fields dihapus — tidak didukung di CMS 3.3.0
    editor:
      preview: false
    fields:
      - {label: "Judul", name: "title", widget: "string"}
      - {label: "Tanggal", name: "date", widget: "datetime", format: "YYYY-MM-DD"}
      - {label: "Kategori", name: "category", widget: "select", options: ["Teknologi", "Pendidikan", "Bisnis", "Pemerintahan", "Startup"]}
      - {label: "Gambar Sampul", name: "image", widget: "image", required: false}
      - {label: "Deskripsi Singkat", name: "description", widget: "text"}
      - {label: "Konten", name: "body", widget: "markdown"}
      - {label: "Penulis", name: "author", widget: "string", default: "Tim SKI"}
